name: zb

on:
  schedule:
    - cron: '0 */4 * * *'  # 每四个小时的第 0 分钟运行
  push:
    branches:
      - main
    paths:
      - '*.txt'  # 仅当有 .txt 文件变化时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install opencv-python requests
          # 添加其他需要的包
          
      - name: Run ZB
        run: python ${{ github.workspace }}/DXZB.py

      - name: 提交更改
        run: |
          git config --local user.email "luoyexp@163.com"
          git config --local user.name "luoye20230624"
          git pull --rebase origin main  # 确保获取最新的 main 分支
          git add .
          git commit -m "Add generated file" || echo "No changes to commit"
          git push -f
